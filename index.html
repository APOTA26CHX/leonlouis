<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leon Louis</title>

<link rel="icon" type="image/png" href="favicon.png?v=3">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #000;
    }

    body {
      overflow: hidden;
    }

    .background {
      position: relative;
      width: 100%;
      height: 100%;
      background:
        linear-gradient(
          to bottom,
          rgba(0, 0, 0, 0.18) 0%,
          rgba(0, 0, 0, 0.08) 35%,
          rgba(0, 0, 0, 0.22) 100%
        ),
        url('image.jpg') no-repeat center center / cover;
    }

    .overlay {
      position: absolute;
      left: 50%;
      bottom: 36px;
      transform: translateX(-50%);
      text-align: center;
    }

    .contact-link {
      display: inline-block;
      color: rgba(245, 245, 240, 0.9);
      text-decoration: none;
      font-family: "Hoefler Text", "Baskerville", "Times New Roman", serif;
      font-size: 11px;
      letter-spacing: 7px;
      text-transform: uppercase;
      transition: opacity 0.25s ease;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .contact-link:hover {
      opacity: 0.68;
    }

    @media (max-width: 768px) {
      .overlay {
        bottom: 28px;
      }

      .contact-link {
        font-size: 10px;
        letter-spacing: 5px;
      }
    }
  </style>
</head>
<body>
  <div class="background">
    <div class="overlay">
  <form action="DIN_BREVO_URL" method="POST" class="contact-form">
    <input type="email" name="EMAIL" placeholder="Enter your email" required>
    <button type="submit">CONTACT</button>
  </form>
</div>
  </div>
</body>
</html>
