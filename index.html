<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leon Louis</title>
  <link rel="icon" type="image/png" href="favicon.png?v=3" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #000;
    }

    body {
      overflow: hidden;
    }

    .background {
      position: relative;
      width: 100%;
      height: 100%;
      background:
        linear-gradient(
          to bottom,
          rgba(0, 0, 0, 0.18) 0%,
          rgba(0, 0, 0, 0.08) 35%,
          rgba(0, 0, 0, 0.22) 100%
        ),
        url('image.jpg') no-repeat center center / cover;
    }

    .overlay {
      position: absolute;
      left: 50%;
      bottom: 36px;
      transform: translateX(-50%);
      text-align: center;
    }

    .contact-form {
      display: flex;
      align-items: center;
      gap: 0;
    }

    .contact-form input[type="email"] {
      width: 250px;
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(245, 245, 240, 0.55);
      color: rgba(245, 245, 240, 0.9);
      padding: 8px 0;
      font-family: "Hoefler Text", "Baskerville", "Times New Roman", serif;
      font-size: 13px;
      letter-spacing: 1px;
      outline: none;
      box-shadow: none;
      border-radius: 0;
      -webkit-appearance: none;
      appearance: none;
    }

    .contact-form input[type="email"]::placeholder {
      color: rgba(245, 245, 240, 0.6);
      font-style: italic;
    }

    .contact-form button {
      margin-left: 18px;
      background: none;
      border: none;
      color: rgba(245, 245, 240, 0.9);
      font-family: "Hoefler Text", "Baskerville", "Times New Roman", serif;
      font-size: 11px;
      letter-spacing: 5px;
      text-transform: uppercase;
      cursor: pointer;
      padding: 0;
      transition: opacity 0.25s ease;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .contact-form button:hover {
      opacity: 0.68;
    }

    .form-note {
      margin-top: 10px;
      color: rgba(245, 245, 240, 0.55);
      font-family: "Hoefler Text", "Baskerville", "Times New Roman", serif;
      font-size: 10px;
      letter-spacing: 1px;
    }

    .input--hidden {
      display: none !important;
    }

    @media (max-width: 768px) {
      .overlay {
        bottom: 28px;
      }

      .contact-form {
        flex-direction: column;
        gap: 12px;
      }

      .contact-form input[type="email"] {
        width: 220px;
        text-align: center;
      }

      .contact-form button {
        margin-left: 0;
        font-size: 10px;
        letter-spacing: 4px;
      }
    }
  </style>
</head>
<body>
  <div class="background">
    <div class="overlay">
      <form
        id="sib-form"
        class="contact-form"
        method="POST"
        action="https://aa3c05eb.sibforms.com/serve/MUIFAKOjbhlVY0jBP43VRJLMw6dSne-7Ijd_ghkS3B6pgP6uYxfayUpBBrDZBcvVRusaux70TS7WnBjhh3X36gy8n4zzngWDp20C-I1UNWH7WcS0VlZK2w5kENkyqGGqVwW-GgJmfRcGfPTY7R-pXdNuNQ-Pfhv-4DsL-Vm3ad_8r2IfeHstGbfTMEHziciRtMWbNSvUlBXFOwJA0g=="
      >
        <input
          type="email"
          id="EMAIL"
          name="EMAIL"
          autocomplete="off"
          placeholder="Enter your email"
          required
        />

        <button type="submit">Contact</button>

        <input type="text" name="email_address_check" value="" class="input--hidden" />
        <input type="hidden" name="locale" value="en" />
        <input type="hidden" name="html_type" value="simple" />
      </form>
    </div>
  </div>
</body>
</html>
